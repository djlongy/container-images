# container-images — upstream image promotion with full DevSecOps
#
# Promotes third-party container images into Harbor base-images/ with
# scanning, SBOM generation, cosign signing, and Vigil supply chain gating.
#
# To promote a new version:
#   1. Update TAG in images/<name>/image.env
#   2. Push to main
#   3. Pipeline builds, scans, signs only the changed images
#
# To rebuild all images: set FORCE_ALL=true in CI/CD variables

include:
  - project: 'infra/gitlab-ci-templates'
    file: '/pipelines/devsecops.yml'
    ref: main
  # Local templates
  - local: '.ci/promote.yml'
  - local: '.ci/check-updates.yml'
  - local: '.ci/renovate.yml'
  - local: '.ci/validate-ci.yml'
  # Per-image pipeline definitions
  - local: 'images/nginx/ci.yml'
  - local: 'images/prometheus/ci.yml'
  - local: 'images/renovate/ci.yml'

stages:
  - .pre
  - verify
  - secret-scan
  - build
  - test
  - scan
  - sign
  - gate
  - promote

variables:
  FORCE_ALL: "false"
  # Alpine via the Docker Hub mirror — works for both path-routed
  # (PULL_REGISTRY/docker-hub/...) and subdomain-routed setups.
  # Override in CI/CD settings to match your registry topology.
  BUILDER_IMAGE: "${DOCKERHUB_MIRROR}/library/alpine:3.21"
  # Alpine APK mirror — replaces dl-cdn.alpinelinux.org/alpine in /etc/apk/repositories.
  # Set to your Artifactory/proxy Alpine remote repo base URL.
  APK_MIRROR: ""
  # Grype vulnerability DB mirror (air-gap support).
  # When ARTIFACTORY_GRYPE_DB_REPO is set, the grype-db-sync job (in
  # .pre stage) mirrors the Anchore CVE DB to that Artifactory repo
  # before any scan runs. Leave empty to let scanners fetch from
  # grype.anchore.io directly.
  ARTIFACTORY_GRYPE_DB_REPO: ""
  GRYPE_DB_MIRROR_SUBPATH: "grype-db/v6"

# Disable ALL default devsecops jobs — this repo has no application source
# code to scan. Per-image jobs (build-xxx, trivy-image-xxx, etc.) replace
# the default build/scan/sign/gate jobs.
ko-build:
  rules: [{ when: never }]
jib-build:
  rules: [{ when: never }]
helm-oci-publish:
  rules: [{ when: never }]
smoke-test:
  script: ["true"]
  rules: [{ when: never }]
buildkit-build:
  rules: [{ when: never }]
trivy-image:
  rules: [{ when: never }]
trivy-fs:
  rules: [{ when: never }]
syft-sbom:
  rules: [{ when: never }]
cosign-sign:
  rules: [{ when: never }]
vigil-notify:
  rules: [{ when: never }]
vigil-check:
  script: ["true"]
  rules: [{ when: never }]
semgrep:
  rules: [{ when: never }]
sonarqube:
  script: ["true"]
  rules: [{ when: never }]
lockfile-check:
  rules: [{ when: never }]
gitleaks:
  rules: [{ when: never }]

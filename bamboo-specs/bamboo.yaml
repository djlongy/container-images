          - name: build-env
            destination: .
    - script:
        interpreter: /bin/sh
        description: Promote nginx to production registry
        body: |
          . ./build.env
          [ "${SKIP:-false}" = "true" ] && { echo "nginx: skipped upstream"; exit 0; }
          curl -sL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz | tar xz crane
          SRC="${IMAGE_DIGEST}"
          DST="${bamboo_PROD_PUSH_REGISTRY}/${bamboo_PROD_PUSH_PROJECT:-base-images}/nginx:${BUILDKIT_TAG}"
          ./crane auth login "${bamboo_PUSH_REGISTRY}" -u "${bamboo_PUSH_REGISTRY_USER}" -p "${bamboo_PUSH_REGISTRY_PASSWORD}"
          ./crane auth login "${bamboo_PROD_PUSH_REGISTRY}" -u "${bamboo_PROD_PUSH_REGISTRY_USER}" -p "${bamboo_PROD_PUSH_REGISTRY_PASSWORD}"
          ./crane copy "${SRC}" "${DST}"
          echo "Promoted: ${DST}"
  requirements:
    - system.docker.executable

# ── Sonarqube ─────────────────────────────────────────────────────────

build-sonarqube:
  tasks:
    - checkout:
        repository: container-images
    - script:
        interpreter: /bin/sh
        description: Gate + build and push sonarqube
        body: |
          if [ "${bamboo_FORCE_ALL:-false}" != "true" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD \
              -- images/sonarqube/ global.env.example Dockerfile scripts/ 2>/dev/null || \
              git diff --name-only HEAD -- images/sonarqube/ global.env.example Dockerfile scripts/)
            if [ -z "$CHANGED" ]; then
              echo "No changes for sonarqube — skipping"
              echo "SKIP=true" > build.env
              exit 0
            fi
          fi

          for var in PULL_REGISTRY PUSH_REGISTRY PUSH_PROJECT VENDOR \
                     DOCKERHUB_MIRROR GHCR_MIRROR QUAY_MIRROR BUILDER_IMAGE \
                     PUSH_REGISTRY_USER PUSH_REGISTRY_PASSWORD \
                     APK_MIRROR APT_MIRROR CA_CERT \
                     REGISTRY_KIND \
                     ARTIFACTORY_URL ARTIFACTORY_USER ARTIFACTORY_PASSWORD \
                     ARTIFACTORY_TOKEN ARTIFACTORY_TEAM ARTIFACTORY_ENVIRONMENT \
                     ARTIFACTORY_PUSH_HOST ARTIFACTORY_IMAGE_REF \
                     ARTIFACTORY_MANIFEST_PATH \
                     ARTIFACTORY_BUILD_NAME ARTIFACTORY_BUILD_NUMBER \
                     ARTIFACTORY_PROPERTIES; do
            bv="bamboo_${var}"
            eval "val=\${${bv}:-}"
            [ -n "${val}" ] && export "${var}=${val}"
          done

          # Log into the push target (build.sh never runs docker login —
          # CI is responsible). Matches .ci/promote.yml behaviour.
          if [ -n "${PUSH_REGISTRY_USER:-}" ] && [ -n "${PUSH_REGISTRY_PASSWORD:-}" ]; then
            echo "${PUSH_REGISTRY_PASSWORD}" | docker login "${PUSH_REGISTRY}" \
              -u "${PUSH_REGISTRY_USER}" --password-stdin
          fi

          # Artifactory backend needs its own docker login (and jf CLI).
          if [ "${REGISTRY_KIND:-}" = "artifactory" ]; then
            if ! command -v jf >/dev/null 2>&1; then
              curl -fL https://install-cli.jfrog.io | sh
              sudo mv jf /usr/local/bin/ 2>/dev/null || mv jf "${HOME}/.local/bin/" 2>/dev/null || true
            fi
            ART_HOST="${ARTIFACTORY_PUSH_HOST:-}"
            if [ -z "${ART_HOST}" ] && [ -n "${ARTIFACTORY_URL:-}" ]; then
              ART_HOST="${ARTIFACTORY_URL#https://}"
              ART_HOST="${ART_HOST#http://}"
              ART_HOST="${ART_HOST%%/*}"
            fi
            if [ -n "${ART_HOST}" ] && [ -n "${ARTIFACTORY_USER:-}" ]; then
              echo "${ARTIFACTORY_TOKEN:-${ARTIFACTORY_PASSWORD:-}}" \
                | docker login "${ART_HOST}" -u "${ARTIFACTORY_USER}" --password-stdin
            fi
          fi

          ./scripts/build.sh sonarqube --push
  artifacts:
    - name: build-env
      location: .
      pattern: build.env
      shared: true
  requirements:
    - system.docker.executable

trivy-sonarqube:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
    - script:
        interpreter: /bin/sh
        description: Trivy vulnerability scan
        body: |
          . ./build.env
          [ "${SKIP:-false}" = "true" ] && { echo "sonarqube: skipped upstream"; exit 0; }
          trivy image --exit-code 0 \
            --severity CRITICAL,HIGH \
            --format json --output trivy-report.json \
            "${TRIVY_IMAGE}"
          trivy image --exit-code 0 --severity CRITICAL,HIGH "${TRIVY_IMAGE}"
  artifacts:
    - name: trivy-report
      location: .
      pattern: trivy-report.json
      shared: true
  requirements:
    - system.docker.executable

sbom-sonarqube:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
    - script:
        interpreter: /bin/sh
        description: Syft SBOM generation
        body: |
          . ./build.env
          [ "${SKIP:-false}" = "true" ] && { echo "sonarqube: skipped upstream"; exit 0; }
          syft "${SYFT_IMAGE}" -o cyclonedx-json=sbom.cdx.json
          echo "SBOM generated: $(grep -c '"name"' sbom.cdx.json) components"
  artifacts:
    - name: sbom
      location: .
      pattern: sbom.cdx.json
      shared: true
  requirements:
    - system.docker.executable

cosign-sonarqube:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
          - name: trivy-report
            destination: .
          - name: sbom
            destination: .
    - script:
        interpreter: /bin/sh
        description: Cosign sign + attestations
        body: |
          . ./build.env
          [ "${SKIP:-false}" = "true" ] && { echo "sonarqube: skipped upstream"; exit 0; }
          TLOG_FLAG="--tlog-upload=false"

          cosign sign --key "${COSIGN_KEY}" --yes ${TLOG_FLAG} \
            -a "ci.build=${bamboo_buildResultKey}" \
            -a "ci.plan=${bamboo_planKey}" \
            "${IMAGE_DIGEST}"

          if [ -f sbom.cdx.json ]; then
            cosign attest --key "${COSIGN_KEY}" --type cyclonedx \
              --predicate sbom.cdx.json --yes ${TLOG_FLAG} "${IMAGE_DIGEST}"
          fi

          if [ -f trivy-report.json ]; then
            cosign attest --key "${COSIGN_KEY}" --type vuln \
              --predicate trivy-report.json --yes ${TLOG_FLAG} "${IMAGE_DIGEST}"
          fi
  requirements:
    - system.docker.executable

promote-prod-sonarqube:
  tasks:
    - artifact-download:
        artifacts:
          - name: build-env
            destination: .
    - script:
        interpreter: /bin/sh
        description: Promote sonarqube to production registry
        body: |
          . ./build.env
          [ "${SKIP:-false}" = "true" ] && { echo "sonarqube: skipped upstream"; exit 0; }
          curl -sL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz | tar xz crane
          SRC="${IMAGE_DIGEST}"
          DST="${bamboo_PROD_PUSH_REGISTRY}/${bamboo_PROD_PUSH_PROJECT:-base-images}/sonarqube:${BUILDKIT_TAG}"
          ./crane auth login "${bamboo_PUSH_REGISTRY}" -u "${bamboo_PUSH_REGISTRY_USER}" -p "${bamboo_PUSH_REGISTRY_PASSWORD}"
          ./crane auth login "${bamboo_PROD_PUSH_REGISTRY}" -u "${bamboo_PROD_PUSH_REGISTRY_USER}" -p "${bamboo_PROD_PUSH_REGISTRY_PASSWORD}"
          ./crane copy "${SRC}" "${DST}"
          echo "Promoted: ${DST}"
  requirements:
    - system.docker.executable

# Auto-generated from .ci/image-ci.yml.template — do not edit by hand
# To change pipeline structure for ALL images, edit the template then run:
#   ./scripts/add-image.sh --regenerate

build-renovate:
  extends: .promote-build
  variables:
    IMAGE_DIR: renovate
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - images/renovate/**
        - global.env.example
        - Dockerfile
        - scripts/**
        - .ci/promote.yml
        - .ci/image-ci.yml.template
    - if: '$FORCE_ALL == "true"'

trivy-image-renovate:
  extends: .promote-scan
  needs: [{ job: build-renovate, artifacts: true }]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - images/renovate/**
        - global.env.example
        - Dockerfile
        - scripts/**
        - .ci/promote.yml
        - .ci/image-ci.yml.template
    - if: '$FORCE_ALL == "true"'

syft-sbom-renovate:
  extends: .promote-sbom
  needs: [{ job: build-renovate, artifacts: true }]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - images/renovate/**
        - global.env.example
        - Dockerfile
        - scripts/**
        - .ci/promote.yml
        - .ci/image-ci.yml.template
    - if: '$FORCE_ALL == "true"'

cosign-sign-renovate:
  extends: .promote-sign
  needs:
    - { job: build-renovate, artifacts: true }
    - { job: trivy-image-renovate, artifacts: true }
    - { job: syft-sbom-renovate, artifacts: true, optional: true }
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - images/renovate/**
        - global.env.example
        - Dockerfile
        - scripts/**
        - .ci/promote.yml
        - .ci/image-ci.yml.template
    - if: '$FORCE_ALL == "true"'

vigil-notify-renovate:
  extends: .promote-notify
  needs:
    - { job: cosign-sign-renovate, optional: true }
    - { job: build-renovate, optional: true, artifacts: true }
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - images/renovate/**
        - global.env.example
        - Dockerfile
        - scripts/**
        - .ci/promote.yml
        - .ci/image-ci.yml.template
    - if: '$FORCE_ALL == "true"'

promote-prod-renovate:
  extends: .promote-prod
  variables:
    IMAGE_DIR: renovate
  needs:
    - { job: build-renovate, artifacts: true }
    - { job: vigil-notify-renovate, optional: true }
  rules:
    - if: '$ENABLE_PROD_PROMOTE != "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - images/renovate/**
        - global.env.example
        - Dockerfile
        - scripts/**
        - .ci/promote.yml
        - .ci/image-ci.yml.template
      when: manual
      allow_failure: true
    - if: '$FORCE_ALL == "true"'
      when: manual
      allow_failure: true

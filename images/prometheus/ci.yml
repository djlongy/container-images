# Auto-generated from .ci/image-ci.yml.template — do not edit by hand
# To change pipeline structure for ALL images, edit the template then run:
#   ./scripts/add-image.sh --regenerate
# Pipeline version: 2

build-prometheus:
  extends: .promote-build
  variables:
    IMAGE_DIR: prometheus
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [images/prometheus/**]
    - if: '$FORCE_ALL == "true"'

trivy-image-prometheus:
  extends: .promote-scan
  needs: [{ job: build-prometheus, artifacts: true }]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [images/prometheus/**]
    - if: '$FORCE_ALL == "true"'

syft-sbom-prometheus:
  extends: .promote-sbom
  needs: [{ job: build-prometheus, artifacts: true }]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [images/prometheus/**]
    - if: '$FORCE_ALL == "true"'

cosign-sign-prometheus:
  extends: .promote-sign
  needs:
    - { job: build-prometheus, artifacts: true }
    - { job: trivy-image-prometheus, artifacts: true }
    - { job: syft-sbom-prometheus, artifacts: true, optional: true }
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [images/prometheus/**]
    - if: '$FORCE_ALL == "true"'

vigil-notify-prometheus:
  extends: .promote-notify
  needs:
    - { job: cosign-sign-prometheus, optional: true }
    - { job: build-prometheus, optional: true, artifacts: true }
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [images/prometheus/**]
    - if: '$FORCE_ALL == "true"'

promote-prod-prometheus:
  extends: .promote-prod
  variables:
    IMAGE_DIR: prometheus
  needs:
    - { job: build-prometheus, artifacts: true }
    - { job: vigil-notify-prometheus, optional: true }
  rules:
    - if: '$ENABLE_PROD_PROMOTE != "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [images/prometheus/**]
      when: manual
      allow_failure: true
    - if: '$FORCE_ALL == "true"'
      when: manual
      allow_failure: true

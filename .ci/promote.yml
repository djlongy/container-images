# Reusable promote template — sources image.env at runtime so per-image
# ci.yml never contains version strings. Edit image.env only.
#
# Jobs:
#   .promote-build  — pull via proxy/cache, add provenance labels, push
#   .promote-scan   — Trivy vulnerability gate
#   .promote-sbom   — Syft deep SBOM generation
#   .promote-sign   — Cosign sign + attestations (Vault Transit)
#   .promote-notify — Vigil supply chain sync
#
# All downstream jobs receive variables from build.env dotenv artifact:
#   IMAGE_NAME, BUILDKIT_TAG, IMAGE_DIGEST, TRIVY_IMAGE, SYFT_IMAGE
#
# All registry/auth settings come from CI/CD variables or global.env.
# Nothing is hardcoded — configure via pipeline variables.

# ── Build ─────────────────────────────────────────────────────────────

.promote-build:
  stage: build
  image:
    name: moby/buildkit:${BUILDKIT_VERSION}
    entrypoint: [""]
  variables:
    BUILDKIT_VERSION: "v0.18.2"
    BUILDKIT_PLATFORM: "linux/amd64"
    BUILDKIT_OCI_MEDIATYPES: "true"
    IMAGE_DIR: ""
  script:
    # Source config — image.env is the single source of truth
    - source global.env
    - source "images/${IMAGE_DIR}/image.env"
    - |
      FULL_IMAGE="${REGISTRY}/${REGISTRY_PROJECT}/${IMAGE_NAME}"
      PROMOTED_TAG="${TAG}-${CI_COMMIT_SHORT_SHA}"
      BASE="${SOURCE}:${TAG}"
      echo "=== Promoting ${IMAGE_NAME} ==="
      echo "  Source:       ${BASE}"
      echo "  Target:       ${FULL_IMAGE}:${PROMOTED_TAG}"
      echo "  Remediate:    ${REMEDIATE:-false}"
      echo "  Inject certs: ${INJECT_CERTS:-false}"
    # Preflight: validate remediate.sh exists if REMEDIATE=true
    - |
      if [ "${REMEDIATE:-false}" = "true" ] && [ ! -f "images/${IMAGE_DIR}/remediate.sh" ]; then
        echo "ERROR: REMEDIATE=true but images/${IMAGE_DIR}/remediate.sh does not exist"
        echo "Create the script or set REMEDIATE=false in image.env"
        exit 1
      fi
    # Select Dockerfile: custom per-image or shared root
    - |
      if [ "${CUSTOM_DOCKERFILE:-false}" = "true" ] && [ -f "images/${IMAGE_DIR}/Dockerfile" ]; then
        DOCKERFILE_DIR="images/${IMAGE_DIR}"
        echo "  Dockerfile:   images/${IMAGE_DIR}/Dockerfile (custom)"
      else
        DOCKERFILE_DIR="."
        echo "  Dockerfile:   Dockerfile (shared)"
      fi
    # Inject CA cert from CI variable (never stored in repo)
    - |
      mkdir -p certs
      if [ "${INJECT_CERTS:-false}" = "true" ]; then
        if [ -n "${CA_CERT:-}" ]; then
          echo "${CA_CERT}" > certs/custom-ca.crt
          echo "  CA cert:      injected from CI variable"
        elif ls certs/*.crt >/dev/null 2>&1; then
          echo "  CA cert:      using certs already on disk"
        else
          echo "ERROR: INJECT_CERTS=true but no CA_CERT variable and no certs on disk"
          echo "Set CA_CERT as a CI/CD variable (paste PEM content)"
          exit 1
        fi
      fi
    # Registry auth
    - mkdir -p /root/.docker
    - |
      if [ -n "${REGISTRY_USER:-}" ] && [ -n "${REGISTRY_PASSWORD:-}" ]; then
        AUTH=$(echo -n "${REGISTRY_USER}:${REGISTRY_PASSWORD}" | base64)
        cat > /root/.docker/config.json <<DOCKEREOF
      {"auths":{"${REGISTRY}":{"auth":"${AUTH}"}}}
      DOCKEREOF
      fi
    # Build custom labels from labels.env file (one key=value per line)
    - |
      EXTRA_LABEL_ARGS=""
      LABELS_FILE="images/${IMAGE_DIR}/labels.env"
      if [ -f "${LABELS_FILE}" ]; then
        while IFS= read -r LABEL || [ -n "${LABEL}" ]; do
          [ -z "${LABEL}" ] && continue
          [ "${LABEL#\#}" != "${LABEL}" ] && continue
          EXTRA_LABEL_ARGS="${EXTRA_LABEL_ARGS} --opt label:${LABEL}"
        done < "${LABELS_FILE}"
        echo "  Custom labels: ${LABELS_FILE}"
      fi
    # Build and push (context = repo root for access to certs/)
    - |
      OCI_FLAG=""
      if [ "${BUILDKIT_OCI_MEDIATYPES}" = "true" ]; then
        OCI_FLAG=",oci-mediatypes=true"
      fi
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context="." \
        --local dockerfile="${DOCKERFILE_DIR}" \
        --opt filename="Dockerfile" \
        --opt platform="${BUILDKIT_PLATFORM}" \
        --opt build-arg:APP_VERSION="${PROMOTED_TAG}" \
        --opt build-arg:BASE_IMAGE="${BASE}" \
        --opt "build-arg:BUILDER_IMAGE=${BUILDER_IMAGE:-alpine:3.21}" \
        --opt build-arg:TAG="${TAG}" \
        --opt "build-arg:VENDOR=${VENDOR:-}" \
        --opt "build-arg:VCS_REF=${CI_COMMIT_SHA}" \
        --opt "build-arg:BUILD_DATE=${CI_JOB_STARTED_AT}" \
        --opt "build-arg:REMEDIATE=${REMEDIATE:-false}" \
        --opt "build-arg:IMAGE_DIR=${IMAGE_DIR}" \
        --opt "build-arg:INJECT_CERTS=${INJECT_CERTS:-false}" \
        --opt "build-arg:ORIGINAL_USER=${ORIGINAL_USER:-root}" \
        ${EXTRA_LABEL_ARGS} \
        --output "type=image,name=${FULL_IMAGE}:${PROMOTED_TAG},push=true${OCI_FLAG}" \
        --metadata-file metadata.json
    # Extract manifest digest from registry (cosign needs this, not config digest)
    # Compatible with Harbor, Artifactory, and Docker Hub registries.
    # Tries OCI manifest first, falls back to Docker v2 manifest.
    #
    # Instead of parsing header names (fragile — casing varies by registry),
    # we grep for the sha256: pattern directly. This is the only value in the
    # response headers that matches sha256:[0-9a-f]{64} — no ambiguity.
    - |
      DIGEST=""
      REPO_PATH=$(echo "${FULL_IMAGE}" | cut -d/ -f2-)
      if [ -n "${REGISTRY_USER:-}" ] && [ -n "${REGISTRY_PASSWORD:-}" ]; then
        AUTH_HEADER="Basic $(echo -n "${REGISTRY_USER}:${REGISTRY_PASSWORD}" | base64)"
        for ACCEPT_TYPE in \
          "application/vnd.oci.image.manifest.v1+json" \
          "application/vnd.docker.distribution.manifest.v2+json"; do
          HEADERS=$(wget -q --header="Authorization: ${AUTH_HEADER}" \
            --header="Accept: ${ACCEPT_TYPE}" \
            --server-response -O /dev/null \
            "https://${REGISTRY}/v2/${REPO_PATH}/manifests/${PROMOTED_TAG}" 2>&1 || true)
          # Match the sha256 digest directly — registry-agnostic, no header parsing
          # Uses -E (extended regex) for busybox/Alpine grep compatibility
          DIGEST=$(echo "${HEADERS}" | grep -oE 'sha256:[0-9a-f]{64}' | head -1 || true)
          [ -n "${DIGEST}" ] && break
        done
      fi
    # Validate and write build.env — single source for all downstream jobs
    - |
      if [ -n "$DIGEST" ] && echo "${DIGEST}" | grep -qE '^sha256:[0-9a-f]{64}$'; then
        IMAGE_DIGEST="${FULL_IMAGE}@${DIGEST}"
        echo "Manifest digest: ${DIGEST}"
      else
        if [ -n "$DIGEST" ]; then
          echo "ERROR: Extracted digest has unexpected format: ${DIGEST}"
          echo "Expected: sha256:<64 hex chars>"
          exit 1
        fi
        echo "WARN: Could not extract manifest digest — using tag reference"
        echo "Cosign signing may not discover attestations via tag-only reference"
        IMAGE_DIGEST="${FULL_IMAGE}:${PROMOTED_TAG}"
      fi
      cat > build.env <<ENVEOF
      IMAGE_NAME=${FULL_IMAGE}
      BUILDKIT_TAG=${PROMOTED_TAG}
      IMAGE_DIGEST=${IMAGE_DIGEST}
      TRIVY_IMAGE=${FULL_IMAGE}:${PROMOTED_TAG}
      SYFT_IMAGE=${FULL_IMAGE}:${PROMOTED_TAG}
      ENVEOF
      echo "Built and pushed: ${FULL_IMAGE}:${PROMOTED_TAG}"
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - metadata.json
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ── Scan ──────────────────────────────────────────────────────────────

.promote-scan:
  extends: .trivy-image
  variables:
    TRIVY_EXIT_CODE: "0"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

.promote-sbom:
  extends: .syft-sbom
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ── Sign ──────────────────────────────────────────────────────────────

.promote-sign:
  extends: .cosign-sign
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ── Gate ──────────────────────────────────────────────────────────────

.promote-notify:
  extends: .vigil-notify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  allow_failure: true

# ── Promote to production registry ────────────────────────────────────
# Copies the exact image (same digest, same layers) from QA/dev registry
# to production registry using crane. No rebuild. Bit-for-bit identical.
#
# Requires manual approval — the job won't run until someone clicks "play".
#
# CI variables needed:
#   PROD_REGISTRY          — production registry hostname
#   PROD_REGISTRY_PROJECT  — project/path in prod registry (defaults to REGISTRY_PROJECT)
#   PROD_REGISTRY_USER     — prod registry username
#   PROD_REGISTRY_PASSWORD — prod registry password
#
# Set ENABLE_PROD_PROMOTE=true as a CI variable to enable the promote stage.
# Without it, promote jobs are skipped (safe default for repos that don't
# need multi-registry promotion).

.promote-prod:
  stage: promote
  image:
    name: gcr.io/go-containerregistry/crane:debug
    entrypoint: [""]
  script:
    - source global.env
    - source "images/${IMAGE_DIR}/image.env"
    - |
      PROMOTED_TAG="${TAG}-${CI_COMMIT_SHORT_SHA}"
      SRC="${REGISTRY}/${REGISTRY_PROJECT}/${IMAGE_NAME}:${PROMOTED_TAG}"
      DST="${PROD_REGISTRY}/${PROD_REGISTRY_PROJECT:-${REGISTRY_PROJECT}}/${IMAGE_NAME}:${PROMOTED_TAG}"
      echo "=== Promoting to production ==="
      echo "  Source: ${SRC}"
      echo "  Dest:   ${DST}"
    # Authenticate to both registries
    - |
      if [ -n "${REGISTRY_USER:-}" ] && [ -n "${REGISTRY_PASSWORD:-}" ]; then
        crane auth login "${REGISTRY}" -u "${REGISTRY_USER}" -p "${REGISTRY_PASSWORD}"
      fi
      if [ -n "${PROD_REGISTRY_USER:-}" ] && [ -n "${PROD_REGISTRY_PASSWORD:-}" ]; then
        crane auth login "${PROD_REGISTRY}" -u "${PROD_REGISTRY_USER}" -p "${PROD_REGISTRY_PASSWORD}"
      fi
    # Copy — same digest, same layers, no rebuild
    - |
      crane copy "${SRC}" "${DST}"
      echo "Promoted: ${DST}"
      echo ""
      echo "Source digest: $(crane digest "${SRC}")"
      echo "Dest digest:   $(crane digest "${DST}")"
  rules:
    - if: '$ENABLE_PROD_PROMOTE != "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_TAG'
      when: manual
      allow_failure: true

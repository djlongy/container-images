# Reusable promote template — thin wrapper around scripts/build.sh so
# GitLab, Bamboo, and local developer runs all share a single source of
# truth. Per-image ci.yml files extend .promote-build with IMAGE_DIR
# pointing at the image name.
#
# Jobs:
#   .promote-build  — calls scripts/build.sh <image> --push
#   .promote-scan   — Trivy vulnerability gate
#   .promote-sbom   — Syft deep SBOM generation
#   .promote-sign   — Cosign sign + attestations (Vault Transit)
#   .promote-notify — Vigil supply chain sync
#   .promote-prod   — crane copy from QA to prod registry (manual)
#
# All downstream jobs receive variables from build.env dotenv artifact:
#   IMAGE_NAME, BUILDKIT_TAG, IMAGE_DIGEST, TRIVY_IMAGE, SYFT_IMAGE
# These are written by scripts/build.sh after a successful push and
# auto-inherited via artifacts.reports.dotenv.
#
# Registry / auth / mirror settings all come from CI/CD variables and
# override the global.env.example defaults per the env-snapshot-and-
# reapply precedence in scripts/build.sh. Nothing is hardcoded.

# ── Build ─────────────────────────────────────────────────────────────
#
# Runs inside docker:cli with a docker:dind sidecar service so
# scripts/build.sh can use `docker build` / `docker push` unchanged.
# Requires a GitLab runner with privileged = true (needed for dind).

.promote-build:
  stage: build
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    # dind over plain TCP on the CI bridge network. The "proper" TLS
    # setup needs /certs/client shared between the dind service and
    # the job container, which requires adding "/certs/client" to the
    # GitLab runner's [runners.docker] volumes list. Until that's
    # ansible-ified, we use the pre-TLS pattern — confined network,
    # acceptable for internal CI.
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    IMAGE_DIR: ""
  before_script:
    # docker:27-cli is alpine-based; scripts/build.sh needs bash, git,
    # openssl (cert placeholder), curl (jf install for artifactory).
    - apk add --no-cache bash git openssl curl
    # Install jf CLI only when the artifactory backend is selected —
    # keeps the default Harbor path fast.
    - |
      if [ "${REGISTRY_KIND:-}" = "artifactory" ]; then
        curl -fL https://install-cli.jfrog.io | sh
        mv jf /usr/local/bin/ 2>/dev/null || true
        jf --version
      fi
  script:
    # Log into the push target so docker push inside build.sh works.
    # build.sh itself never runs docker login — CI is responsible.
    - |
      if [ -n "${PUSH_REGISTRY_USER:-}" ] && [ -n "${PUSH_REGISTRY_PASSWORD:-}" ]; then
        echo "${PUSH_REGISTRY_PASSWORD}" | docker login "${PUSH_REGISTRY}" \
          -u "${PUSH_REGISTRY_USER}" --password-stdin
      fi
    # CA_CERT from CI variable — build.sh's cert injection path reads
    # this env var directly. No file manipulation needed here.
    # For the artifactory backend, docker login to the artifactory host
    # too (build.sh's backend script assumes you're already logged in).
    - |
      if [ "${REGISTRY_KIND:-}" = "artifactory" ] \
         && [ -n "${ARTIFACTORY_URL:-}" ] \
         && [ -n "${ARTIFACTORY_USER:-}" ]; then
        ART_HOST="${ARTIFACTORY_URL#https://}"
        ART_HOST="${ART_HOST#http://}"
        ART_HOST="${ART_HOST%%/*}"
        echo "${ARTIFACTORY_TOKEN:-${ARTIFACTORY_PASSWORD:-}}" \
          | docker login "${ART_HOST}" -u "${ARTIFACTORY_USER}" --password-stdin
      fi
    # Single source of truth — delegate to build.sh. It handles config
    # resolution, distro-aware remediation, cert injection (CA_CERT env
    # → certs/custom-ca.crt), labels.env, REGISTRY_KIND dispatch,
    # build.env emission, and digest pinning.
    - bash ./scripts/build.sh "${IMAGE_DIR}" --push
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ── Scan ──────────────────────────────────────────────────────────────

.promote-scan:
  extends: .trivy-image
  variables:
    TRIVY_EXIT_CODE: "0"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

.promote-sbom:
  extends: .syft-sbom
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ── Grype DB mirror (air-gap support, shared across all images) ──────
#
# Mirrors the Anchore Grype CVE database to an Artifactory generic repo
# so grype can scan without reaching grype.anchore.io. All per-image
# grype scans pull from the same mirror, so this job runs ONCE per
# pipeline (not per-image) in the .pre stage before any scan.
#
# Skipped when ARTIFACTORY_GRYPE_DB_REPO is unset — in that case grype
# falls back to its default (public CDN), which is still the right
# behavior on networks with direct internet egress.
grype-db-sync:
  stage: .pre
  image: ${ALPINE_IMAGE:-alpine:3.21}
  rules:
    - if: '$ARTIFACTORY_GRYPE_DB_REPO != "" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$ARTIFACTORY_GRYPE_DB_REPO != "" && $CI_PIPELINE_SOURCE == "schedule"'
    - when: never
  before_script:
    - apk add --no-cache bash curl python3 coreutils >/dev/null
  script:
    - ./scripts/mirror-grype-db.sh

# ── Sign ──────────────────────────────────────────────────────────────

.promote-sign:
  extends: .cosign-sign
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ── Gate ──────────────────────────────────────────────────────────────

.promote-notify:
  extends: .vigil-notify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  allow_failure: true

# ── Promote dev → prod (Harbor native copy, intra-project) ────────────
# Copies the approved digest from <project>/dev/<image>:<tag> to
# <project>/prod/<image>:<tag> via Harbor's POST /api/v2.0/projects/
# <proj>/repositories/<repo>/artifacts?from=<src> endpoint. Intra-
# project = manifest mount: no blob re-upload, digest preserved bit-
# for-bit. Manual approval gate.
#
# CI variables needed:
#   PUSH_REGISTRY               — harbor hostname (same for dev + prod)
#   PUSH_PROJECT                — includes dev/ sub-path, e.g. base-images/dev
#   PROD_PUSH_PROJECT           — includes prod/ sub-path, e.g. base-images/prod
#   PUSH_REGISTRY_USER/PASSWORD — Harbor creds (robot account preferred)
#
# PROD_PUSH_REGISTRY_USER/PASSWORD still accepted for split-registry
# setups, but when source and dest share a host (the subpath model),
# one credential is enough.
#
# Set ENABLE_PROD_PROMOTE=true to enable this stage.

.promote-prod:
  stage: promote
  image: ${ALPINE_IMAGE:-alpine:3.21}
  before_script:
    - apk add --no-cache bash curl >/dev/null
  script:
    - 'if [ -f images/${IMAGE_DIR}/image.env ]; then . images/${IMAGE_DIR}/image.env; else . images/${IMAGE_DIR}/image.env.example; fi'
    - |
      # Split PUSH_PROJECT (e.g. "base-images/dev") into project + src subpath.
      SRC_PROJECT="${PUSH_PROJECT%%/*}"
      SRC_SUBPATH="${PUSH_PROJECT#*/}"
      DST_PROJECT="${PROD_PUSH_PROJECT%%/*}"
      DST_SUBPATH="${PROD_PUSH_PROJECT#*/}"

      # Harbor's artifact-copy API requires src and dst to live in the
      # same Harbor instance (they do — we're subpath-only). Cross-host
      # promotion needs crane or skopeo; not the supported path here.
      if [ "${SRC_PROJECT}" != "${DST_PROJECT}" ]; then
        echo "ERROR: subpath-model promote requires SRC and DST in the same Harbor project."
        echo "       SRC project: ${SRC_PROJECT}"
        echo "       DST project: ${DST_PROJECT}"
        exit 1
      fi

      # The repo-path under the project: <subpath>/<IMAGE_NAME>
      SRC_REPO="${SRC_SUBPATH}/${IMAGE_NAME}"
      DST_REPO="${DST_SUBPATH}/${IMAGE_NAME}"

      # URL-encode the forward-slash in <subpath>/<image> for the REST path.
      ENC_DST_REPO="${DST_REPO//\//%252F}"

      AUTH="${PUSH_REGISTRY_USER}:${PUSH_REGISTRY_PASSWORD}"
      FROM_REF="${SRC_PROJECT}/${SRC_REPO}:${BUILDKIT_TAG}"
      ENDPOINT="https://${PUSH_REGISTRY}/api/v2.0/projects/${DST_PROJECT}/repositories/${ENC_DST_REPO}/artifacts?from=${FROM_REF}"

      echo "=== Promoting ==="
      echo "  SRC: ${PUSH_REGISTRY}/${SRC_PROJECT}/${SRC_REPO}:${BUILDKIT_TAG}"
      echo "  DST: ${PUSH_REGISTRY}/${DST_PROJECT}/${DST_REPO}:${BUILDKIT_TAG}"

      CODE=$(curl -sS -o /tmp/resp -w "%{http_code}" -u "${AUTH}" -X POST "${ENDPOINT}")
      if [ "${CODE}" != "201" ]; then
        echo "ERROR: Harbor copy API returned HTTP ${CODE}" >&2
        cat /tmp/resp >&2
        exit 1
      fi
      echo "✓ Promoted."
  rules:
    - if: '$ENABLE_PROD_PROMOTE != "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_TAG'
      when: manual
      allow_failure: true

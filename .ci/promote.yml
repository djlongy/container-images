# Reusable promote template — thin wrapper around scripts/build.sh so
# GitLab, Bamboo, and local developer runs all share a single source of
# truth. Per-image ci.yml files extend .promote-build with IMAGE_DIR
# pointing at the image name.
#
# Jobs:
#   .promote-build  — calls scripts/build.sh <image> --push
#   .promote-scan   — Trivy vulnerability gate
#   .promote-sbom   — Syft deep SBOM generation
#   .promote-sign   — Cosign sign + attestations (Vault Transit)
#   .promote-notify — Vigil supply chain sync
#   .promote-prod   — crane copy from QA to prod registry (manual)
#
# All downstream jobs receive variables from build.env dotenv artifact:
#   IMAGE_NAME, BUILDKIT_TAG, IMAGE_DIGEST, TRIVY_IMAGE, SYFT_IMAGE
# These are written by scripts/build.sh after a successful push and
# auto-inherited via artifacts.reports.dotenv.
#
# Registry / auth / mirror settings all come from CI/CD variables and
# override the global.env.example defaults per the env-snapshot-and-
# reapply precedence in scripts/build.sh. Nothing is hardcoded.

# ── Build ─────────────────────────────────────────────────────────────
#
# Runs inside docker:cli with a docker:dind sidecar service so
# scripts/build.sh can use `docker build` / `docker push` unchanged.
# Requires a GitLab runner with privileged = true (needed for dind).

.promote-build:
  stage: build
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: /certs
    DOCKER_CERT_PATH: /certs/client
    DOCKER_TLS_VERIFY: "1"
    IMAGE_DIR: ""
  before_script:
    # docker:27-cli is alpine-based; scripts/build.sh needs bash, git,
    # openssl (cert placeholder), curl (jf install for artifactory).
    - apk add --no-cache bash git openssl curl
    # Install jf CLI only when the artifactory backend is selected —
    # keeps the default Harbor path fast.
    - |
      if [ "${REGISTRY_KIND:-}" = "artifactory" ]; then
        curl -fL https://install-cli.jfrog.io | sh
        mv jf /usr/local/bin/ 2>/dev/null || true
        jf --version
      fi
  script:
    # Log into the push target so docker push inside build.sh works.
    # build.sh itself never runs docker login — CI is responsible.
    - |
      if [ -n "${PUSH_REGISTRY_USER:-}" ] && [ -n "${PUSH_REGISTRY_PASSWORD:-}" ]; then
        echo "${PUSH_REGISTRY_PASSWORD}" | docker login "${PUSH_REGISTRY}" \
          -u "${PUSH_REGISTRY_USER}" --password-stdin
      fi
    # CA_CERT from CI variable — build.sh's cert injection path reads
    # this env var directly. No file manipulation needed here.
    # For the artifactory backend, docker login to the artifactory host
    # too (build.sh's backend script assumes you're already logged in).
    - |
      if [ "${REGISTRY_KIND:-}" = "artifactory" ] \
         && [ -n "${ARTIFACTORY_URL:-}" ] \
         && [ -n "${ARTIFACTORY_USER:-}" ]; then
        ART_HOST="${ARTIFACTORY_URL#https://}"
        ART_HOST="${ART_HOST#http://}"
        ART_HOST="${ART_HOST%%/*}"
        echo "${ARTIFACTORY_TOKEN:-${ARTIFACTORY_PASSWORD:-}}" \
          | docker login "${ART_HOST}" -u "${ARTIFACTORY_USER}" --password-stdin
      fi
    # Single source of truth — delegate to build.sh. It handles config
    # resolution, distro-aware remediation, cert injection (CA_CERT env
    # → certs/custom-ca.crt), labels.env, REGISTRY_KIND dispatch,
    # build.env emission, and digest pinning.
    - bash ./scripts/build.sh "${IMAGE_DIR}" --push
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ── Scan ──────────────────────────────────────────────────────────────

.promote-scan:
  extends: .trivy-image
  variables:
    TRIVY_EXIT_CODE: "0"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

.promote-sbom:
  extends: .syft-sbom
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ── Sign ──────────────────────────────────────────────────────────────

.promote-sign:
  extends: .cosign-sign
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ── Gate ──────────────────────────────────────────────────────────────

.promote-notify:
  extends: .vigil-notify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  allow_failure: true

# ── Promote to production registry ────────────────────────────────────
# Copies the exact image (same digest, same layers) from QA/dev registry
# to production registry using crane. No rebuild. Bit-for-bit identical.
#
# Requires manual approval — the job won't run until someone clicks "play".
#
# CI variables needed:
#   PROD_PUSH_REGISTRY          — production registry hostname
#   PROD_PUSH_PROJECT  — project/path in prod registry (defaults to PUSH_PROJECT)
#   PROD_PUSH_REGISTRY_USER     — prod registry username
#   PROD_PUSH_REGISTRY_PASSWORD — prod registry password
#
# Set ENABLE_PROD_PROMOTE=true as a CI variable to enable the promote stage.
# Without it, promote jobs are skipped (safe default for repos that don't
# need multi-registry promotion).

.promote-prod:
  stage: promote
  image:
    name: gcr.io/go-containerregistry/crane:debug
    entrypoint: [""]
  script:
    # IMAGE_DIGEST is the QA registry ref in digest form (name@sha256:...)
    # inherited from build.env via artifacts.reports.dotenv. Using the
    # digest ref for the source guarantees bit-for-bit promotion — no
    # risk of the tag getting reassigned between build and promote.
    # BUILDKIT_TAG is the original tag we want to preserve on the
    # destination side so downstream consumers keep their version-
    # pinned refs.
    - 'if [ -f images/${IMAGE_DIR}/image.env ]; then . images/${IMAGE_DIR}/image.env; else . images/${IMAGE_DIR}/image.env.example; fi'
    - |
      SRC="${IMAGE_DIGEST}"
      DST="${PROD_PUSH_REGISTRY}/${PROD_PUSH_PROJECT:-${PUSH_PROJECT}}/${IMAGE_NAME}:${BUILDKIT_TAG}"
      echo "=== Promoting to production ==="
      echo "  Source: ${SRC}"
      echo "  Dest:   ${DST}"
    # Authenticate to both registries
    - |
      if [ -n "${PUSH_REGISTRY_USER:-}" ] && [ -n "${PUSH_REGISTRY_PASSWORD:-}" ]; then
        crane auth login "${PUSH_REGISTRY}" -u "${PUSH_REGISTRY_USER}" -p "${PUSH_REGISTRY_PASSWORD}"
      fi
      if [ -n "${PROD_PUSH_REGISTRY_USER:-}" ] && [ -n "${PROD_PUSH_REGISTRY_PASSWORD:-}" ]; then
        crane auth login "${PROD_PUSH_REGISTRY}" -u "${PROD_PUSH_REGISTRY_USER}" -p "${PROD_PUSH_REGISTRY_PASSWORD}"
      fi
    # Copy — same digest, same layers, no rebuild
    - |
      crane copy "${SRC}" "${DST}"
      echo "Promoted: ${DST}"
      echo ""
      echo "Source digest: $(crane digest "${SRC}")"
      echo "Dest digest:   $(crane digest "${DST}")"
  rules:
    - if: '$ENABLE_PROD_PROMOTE != "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_TAG'
      when: manual
      allow_failure: true
